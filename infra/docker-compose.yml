services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edu
      POSTGRES_PASSWORD: edu
      POSTGRES_DB: edu_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edu -d edu_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    # No healthcheck: the qdrant image ships no HTTP client (curl/wget/bash/nc
    # are all absent), so an in-container HTTP probe is impossible. Nothing in
    # this compose file depends_on qdrant health; readiness is gated at the app
    # layer (and via k8s readiness probes in Phase 2).

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://edu:edu@postgres:5432/edu_agent
      NEXTAUTH_SECRET: dev-secret-changeme
      NEXTAUTH_URL: http://localhost:3000
      SALT: dev-salt-changeme
      # Next.js standalone otherwise binds to the container hostname only; force
      # all interfaces so the port mapping and the in-container probe both reach it.
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    # The langfuse image ships wget (not curl). Probe 127.0.0.1 (not localhost,
    # which resolves to IPv6 [::1] where nothing listens) with a GET, not --spider.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # BGE-M3 embedder via Hugging Face Text Embeddings Inference.
  #
  # Opt-in: behind the "embeddings" profile, so the default `docker compose up -d`
  # brings up only the arm64-native core stack. Start it explicitly with:
  #   docker compose --profile embeddings up -d
  #
  # The TEI CPU image is published amd64-only (no arm64 build on any tag), so on
  # Apple Silicon it runs under emulation via `platform: linux/amd64`. It is only
  # needed once the corpus/ingestion services call the real embedding path — the
  # Phase 1 stubs do not, so it can stay down during early development.
  tei-embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.4
    platform: linux/amd64
    profiles: [embeddings]
    command: --model-id BAAI/bge-m3 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - tei_cache:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  # Math verifier MCP server — SSE transport on port 8090.
  # The Agent Service connects to http://math-verifier:8090 via the verify-math Skill.
  # In k8s Phase 2, runs as a sidecar to the agent pod (cluster-internal, no external exposure).
  math-verifier:
    build:
      context: ..
      dockerfile: services/math_verifier/Dockerfile
    ports:
      - "8090:8090"
    environment:
      MATH_VERIFIER_PORT: "8090"
    # FastMCP serves SSE at /sse (no /health route) and the python:3.12-slim base
    # has no curl — so probe the listening port with python, which is in the image.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost', 8090), timeout=2).close()\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  qdrant_data:
  tei_cache:
